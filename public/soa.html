<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer SOA | Post91 Accounts</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif;}
body{background:#eef3f8;color:#061833;padding:28px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.header h1{font-size:34px}.header p{color:#64748b;margin-top:6px}
.back{background:white;color:#0d6efd;text-decoration:none;padding:12px 16px;border-radius:13px;font-weight:900;box-shadow:0 10px 25px rgba(15,23,42,.08);}
.card{background:white;border-radius:22px;padding:26px;box-shadow:0 16px 38px rgba(15,23,42,.08);border:1px solid #e5edf7;margin-bottom:22px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
label{display:block;margin-bottom:7px;font-weight:800;}
input,select{width:100%;padding:13px 14px;border-radius:12px;border:1px solid #dbe4f0;font-size:15px;}
.btn{border:none;background:#0d6efd;color:white;padding:13px 19px;border-radius:13px;font-weight:900;cursor:pointer;}
.btn-light{background:#e2e8f0;color:#0f172a;margin-left:8px;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px;}
.summary{background:white;border-radius:22px;padding:20px;border:1px solid #e5edf7;box-shadow:0 12px 28px rgba(15,23,42,.06);}
.summary span{color:#64748b;font-size:13px;font-weight:800;}
.summary h2{margin-top:8px;color:#0d6efd;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th{text-align:left;color:#64748b;padding:12px;border-bottom:1px solid #e5edf7;font-size:14px;}
td{padding:12px;border-bottom:1px solid #eef2f7;font-weight:700;}
.debit{color:#991b1b}.credit{color:#166534}.balance{color:#0d6efd}
@media(max-width:900px){.grid,.summary-grid{grid-template-columns:1fr 1fr}table{display:block;overflow-x:auto;white-space:nowrap}}
@media(max-width:650px){.grid,.summary-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start;gap:15px}}
@media print{.header,.card.filter-card,.btn{display:none}.summary-grid{grid-template-columns:repeat(4,1fr)}body{background:white;padding:10px}.card{box-shadow:none;border:none}}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Customer SOA</h1>
    <p>Customer statement of account from invoices and receipts.</p>
  </div>
  <a href="/dashboard.html" class="back">Back to Dashboard</a>
</div>

<div class="card filter-card">
  <div class="grid">
    <div>
      <label>Customer</label>
      <select id="customerSelect"></select>
    </div>
    <div>
      <label>From Date</label>
      <input type="date" id="fromDate">
    </div>
    <div>
      <label>To Date</label>
      <input type="date" id="toDate">
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn" onclick="generateSOA()">Generate SOA</button>
      <button class="btn btn-light" onclick="window.print()">Print</button>
    </div>
  </div>
</div>

<div class="summary-grid">
  <div class="summary"><span>Total Invoices</span><h2 id="totalInvoice">OMR 0.000</h2></div>
  <div class="summary"><span>Total Receipts</span><h2 id="totalReceipt">OMR 0.000</h2></div>
  <div class="summary"><span>Closing Balance</span><h2 id="closingBalance">OMR 0.000</h2></div>
  <div class="summary"><span>Transactions</span><h2 id="transactionCount">0</h2></div>
</div>

<div class="card">
  <h2 id="soaTitle" style="color:#0d6efd;margin-bottom:10px;">Statement of Account</h2>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Document</th>
        <th>Description</th>
        <th>Debit</th>
        <th>Credit</th>
        <th>Balance</th>
      </tr>
    </thead>
    <tbody id="soaTable"></tbody>
  </table>
</div>

<script>
function getCustomers(){return JSON.parse(localStorage.getItem("post91Customers") || "[]");}
function getSales(){return JSON.parse(localStorage.getItem("post91SalesInvoices") || "[]");}
function getReceipts(){return JSON.parse(localStorage.getItem("post91Receipts") || "[]");}
function money(n){return "OMR " + Number(n || 0).toFixed(3);}

function loadCustomers(){
  const select=document.getElementById("customerSelect");
  select.innerHTML=`<option value="">All Customers</option>`;
  getCustomers().forEach(c=>{
    const opt=document.createElement("option");
    opt.value=c.customerName;
    opt.textContent=c.customerName;
    select.appendChild(opt);
  });
}

function inDate(date,from,to){
  if(!date) return true;
  const d=new Date(date);
  if(from && d<new Date(from)) return false;
  if(to && d>new Date(to)) return false;
  return true;
}

function generateSOA(){
  const customer=document.getElementById("customerSelect").value;
  const from=document.getElementById("fromDate").value;
  const to=document.getElementById("toDate").value;

  let tx=[];

  getSales().forEach(inv=>{
    if(customer && inv.customerName!==customer) return;
    if(!inDate(inv.invoiceDate,from,to)) return;
    tx.push({
      date:inv.invoiceDate,
      doc:inv.invoiceNo,
      desc:"Sales Invoice",
      debit:Number(inv.grandTotal||0),
      credit:0
    });
  });

  getReceipts().forEach(r=>{
    if(customer && r.customerName!==customer) return;
    if(!inDate(r.receiptDate,from,to)) return;
    tx.push({
      date:r.receiptDate,
      doc:r.receiptNo,
      desc:"Customer Receipt against " + (r.invoiceNo || "-"),
      debit:0,
      credit:Number(r.receiptAmount||0)
    });
  });

  tx.sort((a,b)=>new Date(a.date)-new Date(b.date));

  let balance=0,totalInv=0,totalRec=0;
  const tbody=document.getElementById("soaTable");
  tbody.innerHTML="";

  tx.forEach(t=>{
    balance += t.debit - t.credit;
    totalInv += t.debit;
    totalRec += t.credit;

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${t.date || "-"}</td>
      <td>${t.doc || "-"}</td>
      <td>${t.desc}</td>
      <td class="debit">${t.debit ? money(t.debit) : "-"}</td>
      <td class="credit">${t.credit ? money(t.credit) : "-"}</td>
      <td class="balance">${money(balance)}</td>
    `;
    tbody.appendChild(tr);
  });

  if(tx.length===0){
    tbody.innerHTML=`<tr><td colspan="6">No transactions found.</td></tr>`;
  }

  document.getElementById("totalInvoice").textContent=money(totalInv);
  document.getElementById("totalReceipt").textContent=money(totalRec);
  document.getElementById("closingBalance").textContent=money(balance);
  document.getElementById("transactionCount").textContent=tx.length;
  document.getElementById("soaTitle").textContent=customer ? `Statement of Account - ${customer}` : "Statement of Account - All Customers";
}

loadCustomers();
generateSOA();
</script>

</body>
</html>
