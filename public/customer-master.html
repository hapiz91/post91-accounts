<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Master | Post91 Accounts</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef3f8;color:#061833;padding:26px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header h1{margin:0;color:#0d6efd}
.back{background:#fff;color:#0d6efd;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:800;box-shadow:0 8px 20px #0001}
.card{background:#fff;border:1px solid #e5edf7;border-radius:20px;padding:22px;margin-bottom:20px;box-shadow:0 14px 34px #0001}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.full{grid-column:1/-1}
label{display:block;font-weight:800;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid #dbe4f0;border-radius:11px;font-size:15px}
textarea{min-height:80px}
.btn{border:0;background:#0d6efd;color:white;padding:10px 14px;border-radius:11px;font-weight:900;cursor:pointer}
.btn-light{background:#e2e8f0;color:#0f172a}
.btn-danger{background:#ef4444}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #dbe4f0;padding:8px;vertical-align:top}
th{background:#f8fbff;text-align:left}
.search-box{margin-bottom:14px}
.badge{padding:5px 10px;border-radius:99px;font-size:12px;font-weight:900;display:inline-block}
.active{background:#dcfce7;color:#166534}
.inactive{background:#fee2e2;color:#991b1b}
.note{background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:15px;padding:14px;margin-bottom:18px;font-weight:700}
.loading{color:#0d6efd;font-weight:900;padding:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}table{display:block;overflow-x:auto;white-space:nowrap}}
</style>
<link rel="stylesheet" href="/app-shell.css">
</head>

<body>

<div class="header">
  <div>
    <h1>Customer Master</h1>
    <p>Create, edit, activate/inactivate and manage customer records.</p>
  </div>
  <a class="back" href="/dashboard.html">Back</a>
</div>

<div class="note">
  Customers are now connected to <b>Firebase Firestore</b>. Data will sync across laptop, mobile and other devices.
</div>

<div class="card">
  <h2 id="formTitle">Add Customer</h2>

  <div class="grid">
    <div>
      <label>Customer Name *</label>
      <input id="customerName" placeholder="Customer / Company Name">
    </div>

    <div>
      <label>Contact Person / Attention</label>
      <input id="contactPerson" placeholder="Contact person name">
    </div>

    <div class="full">
      <label>Address</label>
      <textarea id="address" placeholder="Customer address"></textarea>
    </div>

    <div>
      <label>Mobile</label>
      <input id="mobile" placeholder="Mobile number">
    </div>

    <div>
      <label>Email</label>
      <input id="email" placeholder="Email ID">
    </div>

    <div>
      <label>VAT IN Number</label>
      <input id="vatNumber" placeholder="VAT number">
    </div>

    <div>
      <label>Credit Period</label>
      <input id="creditPeriod" placeholder="Example: 30 Days">
    </div>

    <div>
      <label>Status</label>
      <select id="status">
        <option>Active</option>
        <option>Inactive</option>
      </select>
    </div>

    <div class="full">
      <label>Remarks</label>
      <textarea id="remarks" placeholder="Optional remarks"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" onclick="saveCustomer()">Save Customer</button>
    <button class="btn btn-light" onclick="clearForm()">Clear</button>
  </div>
</div>

<div class="card">
  <h2>Customer List</h2>

  <input class="search-box" id="searchText" placeholder="Search by customer name, mobile, email, VAT, contact person..." oninput="renderCustomers()">

  <table>
    <thead>
      <tr>
        <th style="width:60px;">#</th>
        <th>Customer</th>
        <th>Contact</th>
        <th>Mobile</th>
        <th>Email</th>
        <th>VAT IN</th>
        <th>Credit</th>
        <th>Status</th>
        <th style="width:210px;">Action</th>
      </tr>
    </thead>
    <tbody id="customerBody"></tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>

<script>
let EDIT_ID = "";
let CURRENT_CUSTOMERS = [];

function getCurrentCompanyId(){
  try{
    const user = JSON.parse(localStorage.getItem("post91CurrentUser") || "{}");
    return user.companyId || user.businessId || user.email || "default-company";
  }catch(e){
    return "default-company";
  }
}

function badge(s){
  return `<span class="badge ${(s || "Active") === "Active" ? "active" : "inactive"}">${s || "Active"}</span>`;
}

function esc(v){
  return String(v || "").replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

async function loadCustomers(){
  customerBody.innerHTML = `<tr><td colspan="9" class="loading">Loading customers from Firebase...</td></tr>`;

  try{
    const snapshot = await db.collection("customers").get();

    CURRENT_CUSTOMERS = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    CURRENT_CUSTOMERS.sort((a,b)=>{
      return String(a.customerName || a.name || "").localeCompare(String(b.customerName || b.name || ""));
    });

    renderCustomers();

  }catch(error){
    console.error(error);
    customerBody.innerHTML = `<tr><td colspan="9" style="color:red;font-weight:900;">Error loading customers from Firebase.</td></tr>`;
  }
}

function renderCustomers(){
  let q = (searchText.value || "").toLowerCase();

  customerBody.innerHTML = "";

  let shown = 0;

  CURRENT_CUSTOMERS.forEach((c,i)=>{
    let combined = JSON.stringify(c).toLowerCase();

    if(q && !combined.includes(q)) return;

    shown++;

    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${shown}</td>
      <td><b>${esc(c.customerName || c.name || "-")}</b><br><small>${esc(c.address || c.customerAddress || "")}</small></td>
      <td>${esc(c.contactPerson || c.attention || c.contactName || "-")}</td>
      <td>${esc(c.mobile || c.phone || "-")}</td>
      <td>${esc(c.email || "-")}</td>
      <td>${esc(c.vatNumber || "-")}</td>
      <td>${esc(c.creditPeriod || "-")}</td>
      <td>${badge(c.status)}</td>
      <td>
        <button class="btn btn-light" onclick="editCustomer(${i})">Edit</button>
        <button class="btn btn-light" onclick="toggleStatus(${i})">Status</button>
        <button class="btn btn-danger" onclick="deleteCustomer('${c.id}')">Delete</button>
      </td>
    `;

    customerBody.appendChild(tr);
  });

  if(shown === 0){
    customerBody.innerHTML = `<tr><td colspan="9">No customers found.</td></tr>`;
  }
}

async function saveCustomer(){
  let name = customerName.value.trim();

  if(!name){
    alert("Customer name is required.");
    return;
  }

  let rec = {
    customerName:name,
    name:name,

    contactPerson:contactPerson.value.trim(),
    attention:contactPerson.value.trim(),
    contactName:contactPerson.value.trim(),

    address:address.value.trim(),
    customerAddress:address.value.trim(),

    mobile:mobile.value.trim(),
    phone:mobile.value.trim(),

    email:email.value.trim(),
    vatNumber:vatNumber.value.trim(),
    creditPeriod:creditPeriod.value.trim(),
    status:(document.getElementById("status")?.value || "Active"),
    remarks:(document.getElementById("remarks")?.value || "").trim(),

    companyId:getCurrentCompanyId(),
    updatedAt:new Date().toISOString()
  };

  try{
    if(!EDIT_ID){
      rec.createdAt = new Date().toISOString();

      await db.collection("customers").add(rec);

      alert("Customer saved successfully.");
    }else{
      await db.collection("customers").doc(EDIT_ID).set(rec,{merge:true});

      alert("Customer updated successfully.");
    }

    clearForm();
    await loadCustomers();

  }catch(error){
    console.error(error);
    alert("Error saving customer to Firebase.");
  }
}

function editCustomer(i){
  let c = CURRENT_CUSTOMERS[i];

  if(!c)return;

  EDIT_ID = c.id;
  formTitle.textContent = "Edit Customer";

  customerName.value = c.customerName || c.name || "";
  contactPerson.value = c.contactPerson || c.attention || c.contactName || "";
  address.value = c.address || c.customerAddress || "";
  mobile.value = c.mobile || c.phone || "";
  email.value = c.email || "";
  vatNumber.value = c.vatNumber || "";
  creditPeriod.value = c.creditPeriod || "";
  status.value = c.status || "Active";
  remarks.value = c.remarks || "";

  scrollTo({top:0,behavior:"smooth"});
}

async function deleteCustomer(id){
  if(!confirm("Delete this customer?")) return;

  try{
    await db.collection("customers").doc(id).delete();
    alert("Customer deleted successfully.");
    await loadCustomers();
  }catch(error){
    console.error(error);
    alert("Error deleting customer.");
  }
}

async function toggleStatus(i){
  let c = CURRENT_CUSTOMERS[i];

  if(!c)return;

  let newStatus = (c.status || "Active") === "Active" ? "Inactive" : "Active";

  try{
    await db.collection("customers").doc(c.id).set({
      status:newStatus,
      updatedAt:new Date().toISOString()
    },{merge:true});

    await loadCustomers();

  }catch(error){
    console.error(error);
    alert("Error updating status.");
  }
}

function clearForm(){
  EDIT_ID = "";
  formTitle.textContent = "Add Customer";

  customerName.value = "";
  contactPerson.value = "";
  address.value = "";
  mobile.value = "";
  email.value = "";
  vatNumber.value = "";
  creditPeriod.value = "";
  status.value = "Active";
  remarks.value = "";
}

loadCustomers();
</script>

<script src="/permission-guard.js"></script>
<script src="/app-shell.js"></script>
</body>
</html>
