<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Post91 Accounts</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#061833,#0d6efd);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:28px;
  padding:40px;
  box-shadow:0 25px 60px rgba(0,0,0,.2);
}

.logo{
  text-align:center;
  margin-bottom:30px;
}

.logo img{
  height:72px;
  background:#fff;
  padding:8px;
  border-radius:18px;
}

.logo h1{
  margin-top:14px;
  color:#061833;
}

.logo p{
  color:#64748b;
  margin-top:6px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:900;
  color:#061833;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #dbe4f0;
  border-radius:14px;
  font-size:15px;
}

button{
  width:100%;
  border:none;
  background:#0d6efd;
  color:white;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#0056d6;
}

.note{
  margin-top:20px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e3a8a;
  padding:16px;
  border-radius:14px;
  line-height:1.6;
  font-weight:700;
}

.error{
  margin-top:18px;
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#991b1b;
  padding:14px;
  border-radius:14px;
  display:none;
  font-weight:800;
}

.success{
  margin-top:18px;
  background:#dcfce7;
  border:1px solid #86efac;
  color:#166534;
  padding:14px;
  border-radius:14px;
  display:none;
  font-weight:800;
}

.links{
  margin-top:25px;
  text-align:center;
}

.links a{
  color:#0d6efd;
  text-decoration:none;
  font-weight:900;
}

.plan-box{
  margin-top:18px;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  padding:16px;
  border-radius:14px;
  line-height:1.7;
  display:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="/images/post91-logo.png" onerror="this.style.display='none'">
    <h1>Post91 Accounts</h1>
    <p>Simple Accounting for Smart Businesses</p>
  </div>

  <form id="loginForm">

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button type="submit">
      Login to Dashboard
    </button>

  </form>

  <div class="error" id="errorBox"></div>

  <div class="success" id="successBox"></div>

  <div class="plan-box" id="planBox"></div>

  <div class="note">
    Accounts are activated only after Vehicall Admin approval.
  </div>

  <div class="links">
    Don’t have account?
    <a href="/register.html">Register Business</a>
  </div>

</div>

<script>
function getUsers(){
  return JSON.parse(localStorage.getItem("post91Users") || "[]");
}

function showError(msg){
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.innerHTML = msg;

  document.getElementById("successBox").style.display = "none";
}

function showSuccess(msg){
  const box = document.getElementById("successBox");
  box.style.display = "block";
  box.innerHTML = msg;

  document.getElementById("errorBox").style.display = "none";
}

document.getElementById("loginForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  const email =
    document.getElementById("email")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  const users = getUsers();

  const user = users.find(u =>
    (u.email || "").toLowerCase() === email &&
    u.password === password
  );

  if(!user){
    showError("Invalid email or password.");
    return;
  }

  const planBox = document.getElementById("planBox");

  planBox.style.display = "block";

  planBox.innerHTML = `
    <strong>Business:</strong> ${user.businessName}<br>
    <strong>Selected Plan:</strong> ${user.selectedPlan}<br>
    <strong>Registration Status:</strong> ${user.registrationStatus}<br>
    <strong>Account Status:</strong>
    ${user.accountActive ? "Active" : "Inactive"}
  `;

  if(!user.accountActive){

    showError(`
      Login not active.<br><br>
      Your registration is pending Vehicall Admin approval.
    `);

    return;
  }

  localStorage.setItem(
    "post91CurrentUser",
    JSON.stringify(user)
  );

  showSuccess("Login successful. Redirecting...");

  setTimeout(()=>{
    window.location.href = "/dashboard.html";
  },1200);

});
</script>

</body>
</html>
