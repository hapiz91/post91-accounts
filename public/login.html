<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Post91 Accounts</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI,Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#061833,#0d6efd);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:460px;
  background:white;
  border-radius:28px;
  padding:40px;
  box-shadow:0 25px 60px rgba(0,0,0,.2);
}

.logo{
  text-align:center;
  margin-bottom:30px;
}

.logo img{
  height:72px;
  background:#fff;
  padding:8px;
  border-radius:18px;
}

.logo h1{
  margin-top:14px;
  color:#061833;
}

.logo p{
  color:#64748b;
  margin-top:6px;
}

.field{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:900;
  color:#061833;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #dbe4f0;
  border-radius:14px;
  font-size:15px;
}

button{
  width:100%;
  border:none;
  background:#0d6efd;
  color:white;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#0056d6;
}

.note{
  margin-top:20px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e3a8a;
  padding:16px;
  border-radius:14px;
  line-height:1.6;
  font-weight:700;
}

.error{
  margin-top:18px;
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#991b1b;
  padding:14px;
  border-radius:14px;
  display:none;
  font-weight:800;
}

.success{
  margin-top:18px;
  background:#dcfce7;
  border:1px solid #86efac;
  color:#166534;
  padding:14px;
  border-radius:14px;
  display:none;
  font-weight:800;
}

.links{
  margin-top:25px;
  text-align:center;
}

.links a{
  color:#0d6efd;
  text-decoration:none;
  font-weight:900;
}

.plan-box{
  margin-top:18px;
  background:#f8fafc;
  border:1px solid #e2e8f0;
  padding:16px;
  border-radius:14px;
  line-height:1.7;
  display:none;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="/images/post91-logo.png" onerror="this.style.display='none'">
    <h1>Post91 Accounts</h1>
    <p>Simple Accounting for Smart Businesses</p>
  </div>

  <form id="loginForm">

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button type="submit">
      Login to Dashboard
    </button>

<p style="text-align:center;margin-top:14px;">
  <a href="/forgot-password.html"
     style="
       color:#0d6efd;
       text-decoration:none;
       font-weight:900;
     ">
     Forgot Password?
  </a>
</p>
  </form>

  <div class="error" id="errorBox"></div>

  <div class="success" id="successBox"></div>

  <div class="plan-box" id="planBox"></div>

  <div class="note">
    Accounts are activated only after Vehicall Admin approval.
  </div>

  <div class="links">
    Don’t have account?
    <a href="/register.html">Register Business</a>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>
<script src="/firebase-db.js"></script>

<script>

function showError(msg){

  const box =
    document.getElementById("errorBox");

  box.style.display = "block";

  box.innerHTML = msg;

  document.getElementById("successBox")
    .style.display = "none";
}

function showSuccess(msg){

  const box =
    document.getElementById("successBox");

  box.style.display = "block";

  box.innerHTML = msg;

  document.getElementById("errorBox")
    .style.display = "none";
}

function showPlan(user){

  const planBox =
    document.getElementById("planBox");

  planBox.style.display = "block";

  planBox.innerHTML = `

    <strong>Business:</strong>
    ${user.businessName || "-"}

    <br>

    <strong>Selected Plan:</strong>
    ${user.selectedPlan || "-"}

    <br>

    <strong>Registration Status:</strong>
    ${user.registrationStatus || "-"}

    <br>

    <strong>Account Status:</strong>

    ${
      user.accountActive !== false
      ? "Active"
      : "Inactive"
    }

    <br>

    <strong>Role:</strong>
    ${user.role || "User"}

  `;
}

async function loginUser(email,password){

  let user = null;

  /* =====================================================
     1. TRY OLD API LOGIN FIRST
  ===================================================== */

  try{

    const response = await fetch("/api/post91/login",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        email,
        password
      })
    });

    const data = await response.json();

    if(response.ok && data.user){

      user = data.user;
    }

  }catch(err){

    console.log(
      "Old API login failed, trying Firebase..."
    );
  }

  /* =====================================================
     2. CHECK FIREBASE USERS
  ===================================================== */

  if(!user){

    const users =
      await loadFromCloud("post91Users");

    user =
      users.find(u=>

        String(u.email || "")
        .toLowerCase()

        ===

        String(email || "")
        .toLowerCase()
      );

    if(
      user &&
      String(user.password || "")
      !==
      String(password || "")
    ){

      showError("Incorrect password.");

      return;
    }
  }

  /* =====================================================
     3. CHECK REGISTRATION USERS
  ===================================================== */

  if(!user){

    const regs =
      await loadFromCloud("post91Registrations");

    user =
      regs.find(u=>

        String(u.email || "")
        .toLowerCase()

        ===

        String(email || "")
        .toLowerCase()
      );

    if(
      user &&
      String(user.password || "")
      !==
      String(password || "")
    ){

      showError("Incorrect password.");

      return;
    }
  }

  /* =====================================================
     4. VALIDATE USER
  ===================================================== */

  if(!user){

    showError("User not found.");

    return;
  }

  if(
    user.accountActive === false ||
    user.status === "Inactive"
  ){

    showError(
      "Your account is inactive. Please contact admin."
    );

    return;
  }

  /* =====================================================
     5. DEFAULT ADMIN PERMISSIONS
  ===================================================== */

  if(
    !user.permissions ||
    user.permissions.length===0
  ){

    user.role =
      user.role || "Admin";

    user.permissions = [

      "dashboard",
      "companyProfile",
      "userManagement",
      "customerMaster",
      "supplierMaster",
      "itemMaster",
      "cashBankMaster",
      "quotation",
      "deliveryOrder",
      "salesInvoice",
      "receiptVoucher",
      "purchaseInvoice",
      "paymentVoucher",
      "expenseEntry",
      "customerLedger",
      "supplierLedger",
      "stockLedger",
      "cashBankLedger",
      "profitLoss",
      "vatReport",
      "backupRestore"
    ];
  }

  /* =====================================================
     6. SAVE SESSION
  ===================================================== */

  localStorage.setItem(
    "post91CurrentUser",
    JSON.stringify(user)
  );

  sessionStorage.setItem(
    "post91LoggedIn",
    "true"
  );

  showPlan(user);

  showSuccess(
    "Login successful. Redirecting..."
  );

  setTimeout(()=>{

    window.location.href =
      "/dashboard.html";

  },1200);
}
document
  .getElementById("loginForm")
  .addEventListener(
    "submit",
    async function(e){

      e.preventDefault();

      const email =
        document
        .getElementById("email")
        .value
        .trim()
        .toLowerCase();

      const password =
        document
        .getElementById("password")
        .value;

      if(!email){

        showError(
          "Please enter email address."
        );

        return;
      }

      if(!password){

        showError(
          "Please enter password."
        );

        return;
      }

      try{

        await loginUser(
          email,
          password
        );

      }catch(err){

        console.error(err);

        showError(
          "Unable to login. Please try again."
        );
      }
    }
  );

</script>
</body>
</html>
