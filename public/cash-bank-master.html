<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash / Bank Master | Post91 Accounts</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#eef3f8;color:#061833;padding:26px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header h1{margin:0;color:#0d6efd}
.back{background:#fff;color:#0d6efd;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:800;box-shadow:0 8px 20px #0001}
.card{background:#fff;border:1px solid #e5edf7;border-radius:20px;padding:22px;margin-bottom:20px;box-shadow:0 14px 34px #0001}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.full{grid-column:1/-1}
label{display:block;font-weight:800;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid #dbe4f0;border-radius:11px;font-size:15px}
textarea{min-height:80px}
.btn{border:0;background:#0d6efd;color:white;padding:10px 14px;border-radius:11px;font-weight:900;cursor:pointer}
.btn-light{background:#e2e8f0;color:#0f172a}
.btn-danger{background:#ef4444}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #dbe4f0;padding:8px;vertical-align:top}
th{background:#f8fbff;text-align:left}
.search-box{margin-bottom:14px}
.badge{padding:5px 10px;border-radius:99px;font-size:12px;font-weight:900;display:inline-block}
.active{background:#dcfce7;color:#166534}
.inactive{background:#fee2e2;color:#991b1b}
.cash{background:#e0f2fe;color:#075985}
.bank{background:#ede9fe;color:#5b21b6}
.note{background:#e0f2fe;color:#075985;border:1px solid #bae6fd;border-radius:15px;padding:14px;margin-bottom:18px;font-weight:700}
@media(max-width:900px){.grid{grid-template-columns:1fr}table{display:block;overflow-x:auto;white-space:nowrap}}
</style>
</head>

<body>

<div class="header">
  <div>
    <h1>Cash / Bank Master</h1>
    <p>Create and manage cash and bank accounts used in receipts, payments and expense entries.</p>
  </div>
  <a class="back" href="/dashboard.html">Back</a>
</div>

<div class="note">
  This master now saves in Firebase collection <b>cashBankAccounts</b>.
</div>

<div class="card">
  <h2 id="formTitle">Add Cash / Bank Account</h2>

  <div class="grid">
    <div>
      <label>Account Type *</label>
      <select id="accountType" onchange="typeChanged()">
        <option>Bank</option>
        <option>Cash</option>
        <option>Petty Cash</option>
      </select>
    </div>

    <div>
      <label>Account Name *</label>
      <input id="accountName" placeholder="Example: Petty Cash / Bank Muscat">
    </div>

    <div>
      <label>Bank Name</label>
      <input id="bankName" placeholder="Example: Bank Muscat">
    </div>

    <div>
      <label>Account Number</label>
      <input id="accountNumber" placeholder="Account number">
    </div>

    <div>
      <label>IBAN</label>
      <input id="iban" placeholder="IBAN">
    </div>

    <div>
      <label>Branch</label>
      <input id="branch" placeholder="Branch">
    </div>

    <div>
      <label>Opening Balance</label>
      <input type="number" step=".001" id="openingBalance" value="0.000">
    </div>

    <div>
      <label>Opening Balance Type</label>
      <select id="openingBalanceType">
        <option>Debit</option>
        <option>Credit</option>
      </select>
    </div>

    <div>
      <label>Currency</label>
      <input id="currency" value="OMR">
    </div>

    <div>
      <label>Status</label>
      <select id="status">
        <option>Active</option>
        <option>Inactive</option>
      </select>
    </div>

    <div class="full">
      <label>Remarks</label>
      <textarea id="remarks" placeholder="Optional remarks"></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button type="button" class="btn" onclick="saveAccount()">Save Account</button>
    <button type="button" class="btn btn-light" onclick="clearForm()">Clear</button>
  </div>
</div>

<div class="card">
  <h2>Cash / Bank Account List</h2>

  <input class="search-box" id="searchText" placeholder="Search account, bank, account number, IBAN..." oninput="loadAccounts()">

  <table>
    <thead>
      <tr>
        <th style="width:60px;">#</th>
        <th>Account</th>
        <th>Type</th>
        <th>Bank Details</th>
        <th>Opening Balance</th>
        <th>Currency</th>
        <th>Status</th>
        <th style="width:230px;">Action</th>
      </tr>
    </thead>
    <tbody id="accountBody"></tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="/firebase-config.js"></script>
<script src="/firebase-db.js"></script>

<script>
const CASH_BANK_COLLECTION = "cashBankAccounts";
let EDIT_ID = "";
let ACCOUNT_LIST = [];

function mv(n){
  return Number(n || 0).toFixed(3);
}

function typeChanged(){
  const type = accountType.value;
  const isCash = type === "Cash" || type === "Petty Cash";

  bankName.disabled = isCash;
  accountNumber.disabled = isCash;
  iban.disabled = isCash;
  branch.disabled = isCash;

  if(isCash){
    bankName.value = "";
    accountNumber.value = "";
    iban.value = "";
    branch.value = "";

    if(!accountName.value){
      accountName.value = type === "Petty Cash" ? "Petty Cash" : "Cash in Hand";
    }
  }
}

function getAccountData(){
  return {
    accountType: accountType.value || "Bank",
    type: accountType.value || "Bank",

    accountName: accountName.value.trim(),
    name: accountName.value.trim(),

    bankName: bankName.value.trim(),
    accountNumber: accountNumber.value.trim(),
    iban: iban.value.trim(),
    branch: branch.value.trim(),

    openingBalance: mv(openingBalance.value),
    openingBalanceType: openingBalanceType.value || "Debit",
    currency: currency.value.trim() || "OMR",

    status: document.getElementById("status")?.value || "Active",
    remarks: remarks.value.trim(),

    updatedAt: new Date().toISOString()
  };
}

async function saveAccount(){
  if(!accountName.value.trim()){
    alert("Account name is required.");
    return;
  }

  const rec = getAccountData();

  const id = await saveToCloud(CASH_BANK_COLLECTION, rec, EDIT_ID || null);

  if(id){
    alert(EDIT_ID ? "Cash / Bank account updated successfully." : "Cash / Bank account saved successfully.");
    clearForm();
    await loadAccounts(true);
  }
}

function editAccount(id){
  const a = ACCOUNT_LIST.find(x => x.id === id);

  if(!a){
    alert("Account not found.");
    return;
  }

  EDIT_ID = id;
  formTitle.textContent = "Edit Cash / Bank Account";

  accountType.value = a.accountType || a.type || "Bank";
  accountName.value = a.accountName || a.name || "";

  bankName.value = a.bankName || "";
  accountNumber.value = a.accountNumber || "";
  iban.value = a.iban || "";
  branch.value = a.branch || "";

  openingBalance.value = mv(a.openingBalance);
  openingBalanceType.value = a.openingBalanceType || "Debit";
  currency.value = a.currency || "OMR";

  status.value = a.status || "Active";
  remarks.value = a.remarks || "";

  typeChanged();
  scrollTo({top:0, behavior:"smooth"});
}

async function deleteAccount(id){
  if(!confirm("Delete this cash/bank account?")) return;

  await deleteFromCloud(CASH_BANK_COLLECTION, id);
  await loadAccounts(true);
}

async function toggleStatus(id){
  const a = ACCOUNT_LIST.find(x => x.id === id);

  if(!a){
    alert("Account not found.");
    return;
  }

  const newStatus = (a.status || "Active") === "Active" ? "Inactive" : "Active";

  await saveToCloud(CASH_BANK_COLLECTION, {
    ...a,
    status: newStatus,
    updatedAt: new Date().toISOString()
  }, id);

  await loadAccounts(true);
}

function clearForm(){
  EDIT_ID = "";
  formTitle.textContent = "Add Cash / Bank Account";

  accountType.value = "Bank";
  accountName.value = "";
  bankName.value = "";
  accountNumber.value = "";
  iban.value = "";
  branch.value = "";
  openingBalance.value = "0.000";
  openingBalanceType.value = "Debit";
  currency.value = "OMR";
  status.value = "Active";
  remarks.value = "";

  typeChanged();
}

function statusBadge(s){
  return `<span class="badge ${(s || "Active") === "Active" ? "active" : "inactive"}">${s || "Active"}</span>`;
}

function typeBadge(t){
  const type = t || "Bank";
  const cls = type === "Bank" ? "bank" : "cash";
  return `<span class="badge ${cls}">${type}</span>`;
}

async function loadAccounts(force=false){
  let q = (searchText.value || "").toLowerCase();

  ACCOUNT_LIST = await loadFromCloud(CASH_BANK_COLLECTION, force);

  accountBody.innerHTML = "";

  ACCOUNT_LIST.forEach((a, i)=>{
    let combined = JSON.stringify(a).toLowerCase();

    if(q && !combined.includes(q)) return;

    const type = a.accountType || a.type || "Bank";

    let bankDetails = "";

    if(type === "Cash" || type === "Petty Cash"){
      bankDetails = type + " Account";
    }else{
      bankDetails = `
        <b>Bank:</b> ${a.bankName || "-"}<br>
        <b>A/C:</b> ${a.accountNumber || "-"}<br>
        <b>IBAN:</b> ${a.iban || "-"}<br>
        <b>Branch:</b> ${a.branch || "-"}
      `;
    }

    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td><b>${a.accountName || a.name || "-"}</b><br><small>${a.remarks || ""}</small></td>
      <td>${typeBadge(type)}</td>
      <td>${bankDetails}</td>
      <td>${mv(a.openingBalance)} ${a.openingBalanceType || "Debit"}</td>
      <td>${a.currency || "OMR"}</td>
      <td>${statusBadge(a.status)}</td>
      <td>
        <button type="button" class="btn btn-light" onclick="editAccount('${a.id}')">Edit</button>
        <button type="button" class="btn btn-light" onclick="toggleStatus('${a.id}')">Status</button>
        <button type="button" class="btn btn-danger" onclick="deleteAccount('${a.id}')">Delete</button>
      </td>
    `;

    accountBody.appendChild(tr);
  });

  if(accountBody.innerHTML.trim() === ""){
    accountBody.innerHTML = `<tr><td colspan="8">No cash / bank accounts found.</td></tr>`;
  }
}

typeChanged();
loadAccounts(true);
</script>

</body>
</html>
