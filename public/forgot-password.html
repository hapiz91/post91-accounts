<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password | Post91 Accounts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:linear-gradient(135deg,#061833,#0d6efd);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:28px;
  padding:36px;
  box-shadow:0 25px 60px rgba(0,0,0,.2);
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo h1{
  color:#061833;
  margin:0;
}

.logo p{
  color:#64748b;
  margin-top:8px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:900;
  color:#061833;
}

input{
  width:100%;
  padding:14px;
  border:1px solid #dbe4f0;
  border-radius:14px;
  font-size:15px;
}

button{
  width:100%;
  border:none;
  background:#0d6efd;
  color:white;
  padding:15px;
  border-radius:14px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  margin-top:18px;
}

button:hover{
  background:#0056d6;
}

.msg{
  margin-top:18px;
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e3a8a;
  padding:15px;
  border-radius:14px;
  line-height:1.6;
  display:none;
  font-weight:700;
}

.back{
  display:block;
  margin-top:22px;
  text-align:center;
}

.back a{
  color:#0d6efd;
  text-decoration:none;
  font-weight:900;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <h1>Post91 Accounts</h1>
    <p>Simple Accounting for Smart Businesses</p>
  </div>

  <label>Registered Email Address</label>

  <input type="email" id="email" placeholder="Enter your registered email">

  <button onclick="submitRequest()">
    Submit Password Reset Request
  </button>

  <div class="msg" id="msgBox"></div>

  <div class="back">
    <a href="/login.html">← Back to Login</a>
  </div>

</div>

<script>

function submitRequest(){

  const email=document.getElementById("email").value.trim();
  const box=document.getElementById("msgBox");

  if(!email){

    box.style.display="block";

    box.innerHTML=
      "Please enter your registered email address.";

    return;
  }

  box.style.display="block";

  box.innerHTML=
    "Password reset request submitted successfully.<br><br>" +
    "Please contact Post91 Accounts Admin for password reset assistance.";

}
</script>

</body>
</html>
